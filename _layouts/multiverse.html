<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {%- include head.html -%}

  <body class="is-preload">

    <div id="wrapper">

      {%- include header.html -%}

      <div id="main">
        {% for project in site.images %}
        <article class="thumb">
          <a href="{{site.baseurl}}/assets/images/fulls/{{ project.path | split: '/' | last | split: '.' | first }}.jpg" class="image">
            <img src="{{site.baseurl}}/assets/images/thumbs/{{ project.path | split: '/' | last | split: '.' | first }}.jpg" alt="KiCad project: {{ project.title }}" />
          </a>
          <h2>{{ project.title }}</h2>
          <p>{{ project.caption }}</p>
          {% if project.kicad_url %}
            <p>
              <a href="{{ project.kicad_url }}" target="_blank" rel="noopener">View KiCad Files</a>
            </p>
          {% endif %}
        </article>
        {% endfor %}

        <!-- Optional: Additional content such as instructions or project details can go here -->
        <!-- {{ content }} -->
      </div>

      {%- include footer.html -%}

    </div>

    <script src="{{ 'assets/js/jquery.min.js' | relative_url }}"></script>
    <script src="{{ 'assets/js/jquery.poptrox.min.js' | relative_url }}"></script>
    <script src="{{ 'assets/js/browser.min.js' | relative_url }}"></script>
    <script src="{{ 'assets/js/breakpoints.min.js' | relative_url }}"></script>
    <script src="{{ 'assets/js/util.js' | relative_url }}"></script>
    <script src="{{ 'assets/js/main.js' | relative_url }}"></script>

  </body>

</html>
